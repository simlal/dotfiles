# Ensure Wayland/XDG env vars propagate into tmux sessions
set -g update-environment "DISPLAY WAYLAND_DISPLAY XDG_RUNTIME_DIR XDG_SESSION_TYPE XDG_CURRENT_DESKTOP"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-online-status'


######### PREFIX #########
# Set prefix to Ctrl+Space 
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

######### GENERAL SETTINGS #########
# Enable mouse support
set -g mouse on

# Default to zsh
set -g default-shell /usr/bin/zsh

# Set default terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when a window is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 50000

# Enable activity alerts
set -g monitor-activity on
# set -g visual-activity on

# Faster command sequences
set -s escape-time 10

# Refresh status line every 60 seconds
set -g status-interval 60

# Enable focus events
set -g focus-events on

# Clipboard integration
set -g set-clipboard on
set -g allow-passthrough on
set -g terminal-features 'xterm*:clipboard'

######### COLORS (moonfly) #########
# swap these hex values to change the theme
set -g @c_red     "#ff5d5d"   # red normal
set -g @c_green   "#8cc85f"   # green normal
set -g @c_yellow  "#e3c78a"   # yellow normal
set -g @c_blue    "#80a0ff"   # blue normal
set -g @c_purple  "#cf87e8"   # purple normal
set -g @c_teal    "#79dac8"   # cyan normal
set -g @c_fg      "#bdbdbd"   # foreground
set -g @c_bg      "#080808"   # background
set -g @c_overlay "#949494"   # black bright (dim)

### Status bar ###
set -g status-style 'bg=terminal'
set -g status-position top
set -g status-justify "absolute-centre"

# status left style
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@c_red},fg=default,bold]   #S },#{#[bg=default,fg=#{@c_red},bold]  #S }}"
set -ga status-left "#[bg=default,fg=#{@c_overlay},none,bold]│"
set -ga status-left "#[bg=default,fg=#{@c_green},bold]  #{pane_current_command} "
set -ga status-left "#[bg=default,fg=#{@c_overlay},none,bold]│"
set -ga status-left "#[bg=default,fg=#{@c_blue},bold]  #{=/-15/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=default,fg=#{@c_overlay},none,bold]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=default,fg=#{@c_yellow},bold]#{?window_zoomed_flag, 󰍉 zoom ,}"

# status right style
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#[fg=#{@c_red}],#[fg=#{@c_teal}]} #{battery_icon} #{battery_percentage} "
set -ga status-right "#[fg=#{@c_overlay}]│"
set -ga status-right "#{?#{==:#{online_status},ok},#[fg=#{@c_purple}] 󰖩 on ,#[fg=#{@c_red},bold] 󰖪 off }"
set -ga status-right "#[fg=#{@c_overlay}]│"
set -ga status-right "#[fg=#{@c_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# window style
set -wg automatic-rename on
set -g automatic-rename-format ''
set -g window-status-separator '|'
set -g window-status-activity-style none
set -g window-status-bell-style none
set -g status-justify 'absolute-centre'
set -g window-status-format "#[bg=default]#[fg=#{?window_bell_flag,#{@c_red},#{?window_activity_flag,#{@c_yellow},#{@c_overlay}}}] #I#{?window_name,: #W , }#{?window_bell_flag,󰂞 ,}#{?window_activity_flag,● ,}#[default]"
set -g window-status-current-format "#[bg=#{@c_fg}]#[fg=#{?window_bell_flag,#{@c_red},#{?window_activity_flag,#{@c_yellow},#{@c_bg}}}] #I#{?window_name,: #W , }#{?window_bell_flag,󰂞 ,}#{?window_activity_flag,● ,}#[default]"

### Pane borders
set -g pane-active-border-style "fg=#{@c_teal},bold"
set -g pane-border-style "fg=#{@c_overlay}"
set -g pane-border-lines heavy
# set -g pane-border-indicators arrows

# ### Pane dimming
set -g window-active-style 'fg=terminal,bg=terminal'
set -g window-style 'fg=#{@c_overlay},bg=#{@c_bg}'

### Focus hooks for window-level dimming
set-hook -g client-focus-in "set window-active-style 'fg=terminal,bg=terminal'"
set-hook -g client-focus-out "set window-active-style 'fg=#{@c_overlay},bg=#{@c_bg}'"

# Configure Online
set -g @online_icon "ok"
set -g @offline_icon "nok"


######### KEYBINDINGS #########
# unbind-key -a
#
# bind : command-prompt        # tmux command prompt
# bind d detach-client         # you don't have this
# bind ? list-keys             # keybinding help

# Reload config
bind , source-file ~/.tmux.conf \; display "Config reloaded!"

# New tab/windows 
bind t new-window
bind n new-window

# Tab navigation 
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9
bind '[' previous-window
bind ']' next-window

# Close tab/window
bind w kill-window

# Move tabs (windows)
bind < swap-window -d -t -1
bind > swap-window -d -t +1

# Rename window
bind-key r command-prompt -I "#W" "rename-window '%%'"

# Splits / panes
bind x kill-pane
bind '\' split-window -h -c "#{pane_current_path}"  # vertical split (right)
bind - split-window -v -c "#{pane_current_path}"    # horizontal split (down)
bind z resize-pane -Z  # toggle zoom
bind -n C-M-p display-panes

# Split navigation 
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane swapping 
bind H swap-pane -s '{left-of}'   # swap with left pane
bind J swap-pane -s '{down-of}'   # swap with down pane  
bind K swap-pane -s '{up-of}'     # swap with up pane
bind L swap-pane -s '{right-of}'  # swap with right pane

# Split resizing 
bind -n C-M-h resize-pane -L 3
bind -n C-M-l resize-pane -R 3
bind -n C-M-k resize-pane -U 3
bind -n C-M-j resize-pane -D 3
bind = select-layout even-horizontal  # equalize splits

# Session management with sesh
bind-key \/ run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 90%,80% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:75%' \
    --preview 'sesh preview {}'
)\""
bind ` run-shell "sesh last"

# Copy mode settings
setw -g mode-keys vi
bind v copy-mode -e
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Search for lines starting with common prompt indicators
bind-key -T copy-mode-vi p send-keys -X search-backward "^[❯►▶➜]"

# Open scrollback in editor 
set-environment -g EDITOR "nvim"
set-environment -g VISUAL "nvim"
bind s capture-pane -S - -E - \; \
    save-buffer /tmp/tmux-capture.txt \; \
    new-window "sh -c '\$EDITOR /tmp/tmux-capture.txt'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
